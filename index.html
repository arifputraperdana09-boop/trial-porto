<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Teknik Sipil</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navigasi -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-900">Portofolio Civil Engineering</h1>
        </div>
    </nav>

    <!-- Header -->
    <header class="py-20 bg-blue-900 text-white text-center">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4">Halo, Saya Mahasiswa Teknik Sipil</h2>
        </div>
    </header>

    <!-- Proyek -->
    <section id="projects" class="py-16 max-w-6xl mx-auto px-4">
        <h3 class="text-2xl font-bold mb-10 text-center text-blue-900">Portofolio Proyek</h3>
        <div class="grid md:grid-cols-2 gap-8">
            <!-- Proyek SAP2000 -->
            <div class="bg-white p-6 shadow-lg rounded-xl">
                <!-- Pastikan ada file porto2.jpg di folder yang sama -->
                <img src="porto2.jpg" alt="SAP2000 Gedung 22 Lantai" class="w-full h-64 object-cover rounded mb-4 border border-gray-200">
                <h4 class="font-bold text-lg mb-2">SAP2000 Gedung 22 Lantai</h4>
                <p class="text-sm text-gray-600">Pemodelan dan analisis struktur gedung 22 lantai menggunakan software SAP2000.</p>
            </div>
        </div>
    </section>

</body>
</html>
